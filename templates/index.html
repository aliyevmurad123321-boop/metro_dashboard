<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakı Metro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; color: #fff; font-family: Arial, sans-serif; }
        header {
            background: linear-gradient(135deg, #1a1a3e, #0d47a1);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #2962ff;
        }
        header h1 { font-size: 28px; color: #64b5f6; }
        header p { color: #90caf9; margin-top: 5px; }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1a1a3e;
            border: 1px solid #2962ff;
            border-radius: 12px;
            padding: 20px 30px;
            text-align: center;
            min-width: 160px;
        }
        .stat-card h2 { font-size: 32px; color: #64b5f6; }
        .stat-card p { color: #90caf9; font-size: 13px; margin-top: 5px; }
        .chart-section {
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .chart-section h2 {
            color: #64b5f6;
            margin-bottom: 15px;
            font-size: 18px;
        }
        canvas { background: #1a1a3e; border-radius: 12px; padding: 15px; }
        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .station-card {
            background: #1a1a3e;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #2962ff;
            transition: transform 0.2s;
        }
        .station-card:hover { transform: translateY(-3px); }
        .station-name { font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .progress-bar {
            height: 8px;
            background: #0d1b4b;
            border-radius: 4px;
            overflow: hidden;
            margin: 5px 0;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .low { background: #4caf50; }
        .medium { background: #ff9800; }
        .high { background: #f44336; }
        .info { font-size: 12px; color: #90caf9; margin-top: 5px; }
        .refresh-btn {
            display: block;
            margin: 10px auto 20px;
            padding: 12px 30px;
            background: #2962ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #1565c0; }
        footer {
            text-align: center;
            padding: 20px;
            color: #546e7a;
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <h1>🚇 Bakı Metro Sıxlıq Dashboard</h1>
    <p>Real vaxt rejimində sərnişin axını izləmə sistemi</p>
</header>

<div class="stats">
    <div class="stat-card">
        <h2 id="total-stations">-</h2>
        <p>Ümumi Stansiya</p>
    </div>
    <div class="stat-card">
        <h2 id="avg-density">-</h2>
        <p>Orta Sıxlıq (%)</p>
    </div>
    <div class="stat-card">
        <h2 id="most-busy">-</h2>
        <p>Ən Sıx Stansiya</p>
    </div>
    <div class="stat-card">
        <h2 id="least-busy">-</h2>
        <p>Ən Sərbəst Stansiya</p>
    </div>
</div>

<div class="chart-section">
    <h2>📊 Stansiyalar üzrə sıxlıq faizi</h2>
    <canvas id="densityChart" height="100"></canvas>
</div>

<button class="refresh-btn" onclick="loadData()">🔄 Yenilə</button>

<div class="stations-grid" id="stations-grid"></div>

<footer>Metro Hackathon 2025 — Bakı Metropoliteni Sıxlıq İzləmə Sistemi</footer>

<script>
let chart = null;

async function loadData() {
    const res = await fetch('/api/data');
    const data = await res.json();

    const stations = Object.keys(data);
    const densities = stations.map(s => data[s].sixliq);

    // Stats
    document.getElementById('total-stations').textContent = stations.length;
    const avg = Math.round(densities.reduce((a,b) => a+b, 0) / densities.length);
    document.getElementById('avg-density').textContent = avg + '%';

    const maxIdx = densities.indexOf(Math.max(...densities));
    const minIdx = densities.indexOf(Math.min(...densities));
    document.getElementById('most-busy').textContent = stations[maxIdx];
    document.getElementById('least-busy').textContent = stations[minIdx];

    // Chart
    const colors = densities.map(d => d > 70 ? '#f44336' : d > 40 ? '#ff9800' : '#4caf50');
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('densityChart'), {
        type: 'bar',
        data: {
            labels: stations,
            datasets: [{
                label: 'Sıxlıq (%)',
                data: densities,
                backgroundColor: colors,
                borderRadius: 6
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                y: { max: 100, ticks: { color: '#90caf9' }, grid: { color: '#1a2a5e' } },
                x: { ticks: { color: '#90caf9', maxRotation: 45 }, grid: { color: '#1a2a5e' } }
            }
        }
    });

    // Cards
    const grid = document.getElementById('stations-grid');
    grid.innerHTML = '';
    stations.forEach(name => {
        const d = data[name];
        const level = d.sixliq > 70 ? 'high' : d.sixliq > 40 ? 'medium' : 'low';
        const emoji = d.sixliq > 70 ? '🔴' : d.sixliq > 40 ? '🟡' : '🟢';
        grid.innerHTML += `
            <div class="station-card">
                <div class="station-name">${emoji} ${name}</div>
                <div class="progress-bar">
                    <div class="progress-fill ${level}" style="width:${d.sixliq}%"></div>
                </div>
                <div class="info">Sıxlıq: ${d.sixliq}% | Gözləyən: ${d.gozleyen}</div>
            </div>`;
    });
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
